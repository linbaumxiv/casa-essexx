{% extends "base.html" %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
    <h2>Join Casa Essexx</h2>
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="width: 100%; padding: 10px; background-color: #28a745; color: white; border: none; border-radius: 4px; cursor: pointer;">
            Create Account
        </button>
    </form>
    <p style="margin-top: 15px;">
        Already have an account? <a href="{% url 'login' %}">Login here</a>.
    </p>
</div>
{% endblock %}
