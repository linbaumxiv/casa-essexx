{% extends "base.html" %}

{% block content %}
<div style="max-width: 400px; margin: 0 auto; padding: 20px; border: 1px solid #ddd; border-radius: 8px;">
    <h2>Login to Casa Essexx</h2>
    
    <form method="post">
        {% csrf_token %}
        {{ form.as_p }}
        <button type="submit" style="width: 100%; padding: 10px; background-color: #007bff; color: white; border: none; border-radius: 4px; cursor: pointer;">
            Login
        </button>
    </form>
    
    <p style="margin-top: 15px; font-size: 0.9em;">
        Don't have an account? Contact the admin to get started.
    </p>
</div>
{% endblock %}
