{% extends "base.html" %}

{% block content %}
<h2>{% if object %}Edit{% else %}Add{% endif %} Product</h2>

<form method="post" enctype="multipart/form-data" style="max-width: 500px; background: #f9f9f9; padding: 20px; border-radius: 8px;">
    {% csrf_token %}
    
    {{ form.as_p }}
    
    <div style="margin-top: 20px;">
        <button type="submit" style="background: #28a745; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer;">
            Save Product
        </button>
        <a href="{% url 'vendor_dashboard' %}" style="margin-left: 10px; color: #666;">Cancel</a>
    </div>
</form>
{% endblock %}
