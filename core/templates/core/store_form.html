{% extends "base.html" %}

{% block content %}
  <h2>{% if object %}Edit Store: {{ object.name }}{% else %}Create New Store{% endif %}</h2>
  
  <form method="post">
    {% csrf_token %}
    {{ form.as_p }}
    <button type="submit">Save Store</button>
  </form>
  
  <hr>
  <a href="{% url 'vendor_dashboard' %}">Back to Dashboard</a>
{% endblock %}
