{% extends "base.html" %}

{% block content %}
<h2>Are you sure?</h2>
<p>Are you sure you want to delete <strong>"{{ object.name }}"</strong>? This action cannot be undone.</p>

<form method="post">
    {% csrf_token %}
    <button type="submit" style="background: #dc3545; color: white; border: none; padding: 10px 20px; border-radius: 4px; cursor: pointer;">
        Yes, Delete Forever
    </button>
    <a href="{% url 'vendor_dashboard' %}" style="margin-left: 10px; color: #666;">Cancel</a>
</form>
{% endblock %}
